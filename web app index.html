<!DOCTYPE html>
<html>
<head>
    <title>Volume Calculator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        .box {
            background: white;
            padding: 20px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Volume Calculator</h2>
    <p>Slanted Elliptical Cylinder</p>

    <!-- USER INPUTS -->
    <input type="number" id="a" placeholder="Semi-major axis (a)">
    <input type="number" id="b" placeholder="Semi-minor axis (b)">
    <input type="number" id="h" placeholder="Height (h)">

    <button onclick="calculateVolume()">Calculate</button>

    <h3 id="result"></h3>
</div>

<script>
/*
    FUNCTION: calculateVolume
    This function runs when the button is clicked
*/
function calculateVolume() {

    // 1. GET VALUES FROM INPUT FIELDS
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let h = parseFloat(document.getElementById("h").value);

    // 2. VALIDATE INPUT
    if (isNaN(a) || isNaN(b) || isNaN(h)) {
        alert("Please enter valid numbers!");
        return;
    }

    // 3. FORMULA:
    // Volume = π × a × b × h
    let volume = Math.PI * a * b * h;

    // 4. DISPLAY RESULT
    document.getElementById("result").innerText =
        "Volume = " + volume.toFixed(2);
}
</script>

</body>
</html>
